name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -project OpenResponses.xcodeproj \
            -scheme OpenResponses \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: brew list swiftlint || brew install swiftlint
      - run: swiftlint lint --reporter github-actions-logging
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        run: |
          if grep -rE "sk-[a-zA-Z0-9]{48}" --include="*.swift" --include="*.json" .; then
            echo "❌ Potential API key found"; exit 1
          fi
          echo "✅ No secrets found"

  docs:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          for f in README.md LICENSE PRIVACY.md; do
            [ -f "$f" ] && echo "✅ $f" || { echo "❌ Missing $f"; exit 1; }
          done
